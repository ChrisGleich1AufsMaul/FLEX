name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  xcode:
    name: Xcode build and tests
    runs-on: macos-15

    env:
      DERIVED_DATA_PATH: build/DerivedData

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build FLEX framework
        run: |
          xcodebuild build \
            -project FLEX.xcodeproj \
            -scheme FLEX \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload FLEX framework
        uses: actions/upload-artifact@v4
        with:
          name: FLEX-framework-debug-iphonesimulator
          path: ${{ env.DERIVED_DATA_PATH }}/Build/Products/Debug-iphonesimulator/FLEX.framework
          if-no-files-found: error

      - name: Run FLEX tests
        run: |
          xcodebuild test \
            -project FLEX.xcodeproj \
            -scheme FLEXTests \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO
